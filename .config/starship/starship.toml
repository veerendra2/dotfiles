"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$shlvl\
$git_branch\
$git_status\
$kubernetes\
$terraform\
$python\
$nodejs\
$golang\
$rust\
$ruby\
$aws\
$azure\
$docker_context\
$vagrant\
$direnv\
$jobs\
$time\
$cmd_duration\
$line_break\
$character"""

add_newline = true

palette = "cusom"

[username]
format = '[$user]($style) at '

[hostname]
format = '[$hostname]($style) in '

[shlvl]
disabled = false
format = '[$symbol$shlvl]($style) '
symbol = "пҒҪ "
threshold = 3

[directory]
format = '[$path ]($style)[$read_only]($read_only_style)'
read_only = "уұӘЁ "
read_only_style = "red"
style = 'bold color_aqua'
truncate_to_repo = false
truncation_length = 3
truncation_symbol = 'вҖҰ/'

[directory.substitutions]
'Documents' = 'у°Ҳҷ'
'Downloads' = 'пҖҷ '
'Music' = 'пҖҒ '
'Pictures' = 'пҖҫ '
'projects' = 'оә§ '

[kubernetes]
format = '[$symbol$context\($namespace\)]($style) '
symbol = "уұғҫ "
disabled = false
contexts = [
  { context_pattern = "^dev.*", style = "color_purple" },
  { context_pattern = "^stage.*", style = "color_orange" },
  { context_pattern = "^prod.*", style = "color_red" },
]

[git_branch]
format = '[on](white) [$symbol$branch ]($style)'
style = 'color_green'
symbol = 'оӮ  '
truncation_length = 20
truncation_symbol = 'вҖҰ'

[git_status]
style = 'color_red_1'
format = '([$all_status$ahead_behind]($style) )'

[python]
format = '[${symbol}${pyenv_prefix}(${version})(\($virtualenv\) )]($style)'
pyenv_version_name = true
style = 'teal'
symbol = 'оҲө '

[nodejs]
style = 'blue'
symbol = 'оңҳ '
format = "[$symbol($version )]($style)"

[golang]
style = 'blue'
symbol = 'оҳ§ '
format = "[$symbol($version )]($style)"

[rust]
style = 'orange'
symbol = 'оһЁ '
format = "[$symbol($version )]($style)"

[ruby]
style = 'blue'
symbol = 'оһ‘ '
format = "[$symbol($version )]($style)"

[package]
symbol = 'у°Ҹ— '

[aws]
symbol = 'пү° '
style = 'yellow'
format = '[$symbol($profile)]($style)'

[azure]
disabled = true
format = '$symbol($subscription) '
symbol = 'у° … '

[terraform]
disabled = false
format = '[$symbol$version]($style) '
style = 'bold 105'
symbol = 'уұҒў '

[docker_context]
detect_extensions = ['Dockerfile']
detect_files = [
  'docker-compose.yml',
  'docker-compose.yaml',
  'Dockerfile',
  'compose.yml',
  'compose.yaml',
]
disabled = false
format = '[$symbol]($style) '
only_with_files = true
style = 'fg:#06969A'
symbol = 'пҢҲ '

[jobs]
format = '[$symbol]($style)'
number_threshold = 1
style = 'red'
symbol = 'пҖ“ '

[time]
disabled = false
format = '[уұ‘’ $time]($style) '
time_format = '%T'
utc_time_offset = 'local'

[cmd_duration]
format = '[уұ«Қ $duration]($style)'
min_time = 500
style = "color_cyan"

[vagrant]
format = '[$symbol($version )]($style)'
symbol = 'оЈҗ '
version_format = 'v${raw}'

[direnv]
allowed_msg = 'о®Ө '
denied_msg = 'п‘® '
disabled = false
loaded_msg = 'о®Ө '
not_allowed_msg = 'у°Ӯӯ '
style = "bright-yellow"
unloaded_msg = 'у°ҝ… '

[character]
disabled = false
error_symbol = '[пҗІ](bold fg:color_red)'
success_symbol = '[пҗІ](bold fg:color_green)'

[os.symbols]
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
Arch = "у°ЈҮ"
Artix = "у°ЈҮ"
CentOS = "пҢ„"
Debian = "у°Јҡ"
EndeavourOS = "пҶ—"
Fedora = "у°Јӣ"
Gentoo = "у°ЈЁ"
Linux = "у°ҢҪ"
Macos = "у°Җө"
Manjaro = "пҢ’"
Mint = "у°Јӯ"
Pop = "пҢӘ"
Raspbian = "у°җҝ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"
SUSE = "пҢ”"
Ubuntu = "у°•Ҳ"
Windows = "у°ҚІ"

[palettes.cusom]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_red_1 = '#e06c75'
color_yellow = '#d79921'
color_cyan = '#56b6c2'
